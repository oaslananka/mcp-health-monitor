variables:
  NODE_VERSION: '20.x'
  NPM_CACHE_DIR: $(Pipeline.Workspace)/.npm

stages:
  - stage: validate
    displayName: Validate
    jobs:
      - job: build_test_lint
        displayName: Build · Test · Lint
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            clean: true

          - task: NodeTool@0
            displayName: Use Node $(NODE_VERSION)
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            displayName: Cache npm
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(NPM_CACHE_DIR)

          - script: npm ci
            displayName: Install (npm ci)
            env:
              npm_config_cache: $(NPM_CACHE_DIR)

          - script: npm run ci:check
            displayName: Validate package

      - job: coverage
        displayName: Coverage
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            clean: true

          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)

          - script: npm ci
            displayName: Install

          - script: npm run test:coverage
            displayName: Coverage

  - stage: docker
    displayName: Docker Build Verify
    dependsOn: validate
    condition: succeeded()
    jobs:
      - job: docker_build
        displayName: Docker Build
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - script: docker build -t mcp-health-monitor:ci .
            displayName: Docker Build
          - script: |
              docker run -d --name test-container -p 3001:3000 mcp-health-monitor:ci
              sleep 5
              curl -f http://127.0.0.1:3001/health
              docker stop test-container
              docker rm test-container
            displayName: Docker Health Check

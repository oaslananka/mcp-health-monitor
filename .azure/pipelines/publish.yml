trigger: none
pr: none

parameters:
  - name: npm_tag
    displayName: NPM Tag
    type: string
    default: latest
    values:
      - latest
      - beta
      - next

  - name: dry_run
    displayName: Dry Run (pack only, do not publish)
    type: boolean
    default: false

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: '20.x'

stages:
  - stage: pre_publish
    displayName: Pre-Publish Validation
    jobs:
      - job: validate
        displayName: Full Validation
        steps:
          - checkout: self
            clean: true

          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)

          - script: npm ci
            displayName: Install

          - script: npm run ci:check
            displayName: Build + Test + Lint

          - script: npm pack --dry-run
            displayName: Pack Dry Run

  - stage: publish
    displayName: Publish to npm
    dependsOn: pre_publish
    condition: succeeded()
    jobs:
      - deployment: npm_publish
        displayName: npm publish
        environment: npm-production
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  clean: true

                - task: NodeTool@0
                  inputs:
                    versionSpec: $(NODE_VERSION)

                - script: npm ci
                  displayName: Install

                - script: npm run build
                  displayName: Build

                - task: npmAuthenticate@0
                  inputs:
                    workingFile: .npmrc

                - bash: |
                    if [ "${{ parameters.dry_run }}" = "true" ]; then
                      echo "DRY RUN - would publish with tag: ${{ parameters.npm_tag }}"
                      npm pack --dry-run
                    else
                      npm publish --access public --tag ${{ parameters.npm_tag }}
                      echo "Published with tag: ${{ parameters.npm_tag }}"
                    fi
                  displayName: Publish (or dry run)
                  env:
                    NODE_AUTH_TOKEN: $(NPM_TOKEN)

                - bash: |
                    VERSION=$(node -p "require('./package.json').version")
                    git tag "v${VERSION}"
                    git push origin "v${VERSION}"
                  displayName: Tag Git Release
                  condition: and(succeeded(), eq('${{ parameters.dry_run }}', false))

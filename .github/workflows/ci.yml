# Azure Pipelines is the authoritative CI for this repository.
# This GitHub workflow stays intentionally minimal as a PR smoke test.
name: CI (GitHub)

on:
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm test
